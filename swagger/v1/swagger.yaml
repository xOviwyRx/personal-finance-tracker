                    email:
                      type: string
                      example: test@example.com
                    password:
                      type: string
                      example: password
                    password_confirmation:
                      type: string
                      example: password
              required:
              - email
              - password
              - password_confirmation
  "/users/sign_out":
    delete:
      summary: sign out
      tags:
      - Authentication
      description: Logs out user by revoking their authentication token.
      responses:
        '200':
          description: successful sign out
          content:
            application/json:
              schema:
                type: object
                properties:
