                      transactions
  "/reports/monthly":
    get:
      summary: monthly spending summary
      tags:
      - Reports
      parameters:
      - name: month
        in: query
        required: false
        description: Month in YYYY-MM format. Defaults to current month if omitted.
        example: 2026-04
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                    example: 2026-04
                  total_income:
                    type: string
                    example: '3000.0'
                  total_expenses:
                    type: string
                    example: '2450.0'
                  net:
                    type: string
                    example: '550.0'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid month format. Use YYYY-MM.
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
