---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/budgets":
    get:
      summary: list budgets
      tags:
      - Budgets
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    monthly_limit:
                      type: string
                    month:
                      type: string
                      format: date
                    category_id:
                      type: integer
                    created_at:
                      type: string
                      format: datetime
                    updated_at:
                      type: string
                      format: datetime
                    user_id:
                      type: integer
                    category:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      summary: create budgets
      tags:
      - Budgets
      parameters: []
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  monthly_limit:
                    type: string
                  month:
                    type: string
                    format: date
                  category_id:
                    type: integer
                  created_at:
                    type: string
                    format: datetime
                  updated_at:
                    type: string
                    format: datetime
                  user_id:
                    type: integer
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '422':
          description: unprocessable entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                monthly_limit:
                  type: string
                month:
                  type: string
                  format: date
                category_id:
                  type: integer
              required:
              - monthly_limit
  "/budgets/{id}":
    parameters:
    - name: id
