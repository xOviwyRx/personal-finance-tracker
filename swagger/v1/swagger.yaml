  "/users/sign_in":
    post:
      summary: sign in
      tags:
      - Authentication
      security: []
      parameters: []
      responses:
        '200':
          description: successful sign in
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: test_token
                  user:
                    type: object
                    properties:
                      email:
                        type: string
                        example: test@example.com
                      password:
                        type: string
                        example: password
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid credentials
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: test@example.com
                    password:
                      type: string
                      example: password
              required:
              - email
              - password
  "/users/":
    post:
      summary: sign up
      tags:
      - Authentication
      security: []
      parameters: []
      responses:
        '201':
          description: successful sign up
          content:
            application/json:
              schema:
                type: object
