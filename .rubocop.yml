inherit_from: .rubocop_todo.yml
plugins:
  - rubocop-rails
  - rubocop-rspec
AllCops:
  NewCops: enable
  SuggestExtensions: false

# rswag integration specs use a DSL (path/get/response/run_test!) that
# rubocop-rspec doesn't understand as example groups. Its structural and hook
# cops therefore misfire on them — ScatteredSetup's autocorrect even merges
# `before` hooks across different response blocks, breaking the specs. Exclude
# the rswag specs from these cops.
RSpec/ScatteredSetup:
  Exclude:
    - 'spec/integration/**/*'
RSpec/EmptyLineAfterHook:
  Exclude:
    - 'spec/integration/**/*'

# rswag resolves the Bearer security header from a `let(:Authorization)`,
# so the PascalCase name is required and can't be snake_cased.
RSpec/VariableName:
  AllowedPatterns:
    - '^Authorization$'

Style/ClassAndModuleChildren:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Rails/I18nLocaleTexts:
  Enabled: false

Rails/UniqueValidationWithoutIndex:
  Enabled: false

Rails/NotNullColumn:
  Enabled: false

Rails/ResponseParsedBody:
  Enabled: false

Style/StringConcatenation:
  Enabled: false

Rails/BulkChangeTable:
  Enabled: false

Rails/ReversibleMigration:
  Enabled: false

RSpec/EmptyExampleGroup:
  Enabled: false

RSpec/DescribedClass:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/IndexedLet:
  Enabled: false

RSpec/LetSetup:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/NestedGroups:
  Enabled: false

Rails/TimeZone:
  Enabled: false

Rails/Output:
  Enabled: false

Rails/Exit:
  Enabled: false